<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="8"/>
  <!-- Cluster box -->
  <rect x="400" y="60" width="340" height="280" rx="12" fill="none" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="420" y="90" font-family="sans-serif" font-size="14" fill="#8b949e">Kubernetes Cluster</text>
  <!-- Services -->
  <rect x="430" y="110" width="120" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="490" y="140" font-family="sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Service A</text>
  <rect x="590" y="110" width="120" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="650" y="140" font-family="sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Service B</text>
  <rect x="430" y="200" width="120" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="490" y="230" font-family="sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Database</text>
  <rect x="590" y="200" width="120" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="650" y="230" font-family="sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Queue</text>
  <!-- Laptop -->
  <rect x="60" y="140" width="200" height="120" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="160" y="190" font-family="sans-serif" font-size="14" fill="#c9d1d9" text-anchor="middle">Your Local</text>
  <text x="160" y="210" font-family="sans-serif" font-size="14" fill="#c9d1d9" text-anchor="middle">Process</text>
  <!-- Connection arrow -->
  <line x1="260" y1="200" x2="430" y2="135" stroke="#3fb950" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="260" y1="200" x2="430" y2="225" stroke="#3fb950" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- mirrord label -->
  <rect x="300" y="175" width="90" height="30" rx="15" fill="#238636"/>
  <text x="345" y="195" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">mirrord</text>
</svg>
